services:
  postgres:
    image: postgres:16-alpine
    container_name: ghoomo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ghoomo}
      POSTGRES_USER: ${POSTGRES_USER:-ghoomo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghoomo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghoomo} -d ${POSTGRES_DB:-ghoomo}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
